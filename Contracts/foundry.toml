[profile.default]
# Foundry configuration for EscrowX contracts
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

# Compiler settings
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# EVM settings
evm_version = "shanghai"

# Remappings for dependencies
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@foundry-std/=lib/forge-std/src/"
]

# Gas reporting
gas_reports = ["*"]
gas_reports_ignore = ["test/**/*"]

# Testing settings
fuzz = { runs = 256 }
invariant = { runs = 256, depth = 15, fail_on_revert = false }

# RPC endpoints for different networks
[rpc_endpoints]
mainnet = "https://eth-mainnet.g.alchemy.com/v2/${MAINNET_RPC_URL}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${SEPOLIA_RPC_URL}"
anvil = "http://localhost:8545"

# Etherscan configuration for verification
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# Format settings
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

# Documentation settings
[doc]
out = "docs"
title = "EscrowX Protocol"
book = "book.toml"
repository = "https://github.com/your-org/escrow-x"
ignore = ["test/**/*"]